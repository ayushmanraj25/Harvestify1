<!-- Include Marked.js for Markdown parsing -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- Floating Chatbot Toggle Button -->
<button id="chatbot-toggle" class="chatbot-btn shadow-lg">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
</button>

<!-- Chatbot Window -->
<div id="chatbot-window" class="chatbot-window shadow-lg d-none">
    <!-- Header -->
    <div class="chatbot-header">
        <h6 class="mb-0 text-white font-weight-bold d-flex align-items-center">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="mr-2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
            Harvestify AI
        </h6>
        <button id="chatbot-close" class="btn text-white p-0 m-0 shadow-none border-0">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
    </div>

    <!-- Messages Area -->
    <div id="chatbot-messages" class="chatbot-messages">
        <div class="chat-msg ai-msg">
            <div class="msg-bubble shadow-sm">
                Hello! I am Harvestify AI. Ask me anything about farming, crops, or weather advice. (e.g. "Wheat me barish ke baad kya kare?")
            </div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="chatbot-input">
        <input type="text" id="chatbot-input-field" class="form-control" placeholder="Ask your question here..." autocomplete="off">
        <button id="chatbot-send" class="btn btn-success shadow-sm ml-2 rounded-circle d-flex align-items-center justify-content-center" style="width: 42px; height: 42px; padding: 0;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>
</div>

<style>
/* Chatbot Button */
.chatbot-btn {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 65px;
    height: 65px;
    background: linear-gradient(135deg, #52b76c, #45a05b);
    color: white;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    z-index: 1050;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.chatbot-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 10px 25px rgba(82, 183, 108, 0.4) !important;
}

/* Chatbot Window - Dark Mode */
.chatbot-window {
    position: fixed;
    bottom: 110px;
    right: 30px;
    width: 350px;
    max-width: 90vw;
    height: 450px;
    background: #1e1e1e; /* Dark Mode Bg */
    border-radius: 20px;
    z-index: 1050;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    resize: both;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    transform-origin: bottom right; /* Mac minimize origin */
    animation: scaleUp 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

.chatbot-closing {
    animation: scaleDown 0.3s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards !important;
}

@keyframes scaleDown {
    from { opacity: 1; transform: scale(1) translate(0, 0); }
    to { opacity: 0; transform: scale(0.1) translate(150px, 150px); }
}

@keyframes scaleUp {
    from { opacity: 0; transform: scale(0.1) translate(150px, 150px); }
    to { opacity: 1; transform: scale(1) translate(0, 0); }
}

.chatbot-header {
    background: linear-gradient(135deg, #2a2a2a, #111);
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.chatbot-messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    background: #121212;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* Message Bubbles */
.chat-msg {
    display: flex;
    width: 100%;
}

.ai-msg {
    justify-content: flex-start;
}

.user-msg {
    justify-content: flex-end;
}

.msg-bubble {
    max-width: 85%;
    padding: 10px 15px;
    border-radius: 18px;
    font-size: 0.95rem;
    line-height: 1.5;
    word-wrap: break-word;
}

/* Markdown styling inside bubble */
.msg-bubble p { margin-bottom: 0.5rem; }
.msg-bubble p:last-child { margin-bottom: 0; }
.msg-bubble strong { font-weight: 600; color: #fff; }
.msg-bubble ul, .msg-bubble ol { margin-bottom: 0.5rem; padding-left: 1.5rem; }

.ai-msg .msg-bubble {
    background: #2d2d2d;
    color: #e0e0e0;
    border-bottom-left-radius: 4px;
    border: 1px solid rgba(255,255,255,0.05);
}

.user-msg .msg-bubble {
    background: #4caf50;
    color: #fff;
    border-bottom-right-radius: 4px;
}

.chatbot-input {
    padding: 12px 15px;
    background: #1e1e1e;
    border-top: 1px solid rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
}

.chatbot-input .form-control {
    border-radius: 20px;
    background: #2d2d2d;
    border: 1px solid transparent;
    color: #fff;
    font-size: 0.95rem;
}

.chatbot-input .form-control::placeholder {
    color: #888;
}

.chatbot-input .form-control:focus {
    box-shadow: none;
    background: #333;
    border-color: #4caf50;
    color: #fff;
}

/* Typing animation */
.typing-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: #52b76c;
    border-radius: 50%;
    margin: 0 2px;
    animation: typing 1.4s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing {
    0%, 100% { transform: translateY(0); opacity: 0.4; }
    50% { transform: translateY(-4px); opacity: 1; }
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const toggleBtn = document.getElementById("chatbot-toggle");
    const closeBtn = document.getElementById("chatbot-close");
    const windowDiv = document.getElementById("chatbot-window");
    const sendBtn = document.getElementById("chatbot-send");
    const inputField = document.getElementById("chatbot-input-field");
    const messagesDiv = document.getElementById("chatbot-messages");

    // Store chat history
    let chatHistory = [];

    // Clear chatbot memory event
    document.addEventListener('clearChatbotMemory', () => {
        chatHistory = [];
        messagesDiv.innerHTML = `
        <div class="chat-msg ai-msg">
            <div class="msg-bubble shadow-sm">
                Hello! I am Harvestify AI. Ask me anything about farming, crops, or weather advice. (e.g. "Wheat me barish ke baad kya kare?")
            </div>
        </div>`;
    });

    // Helper to close chatbot
    function closeChatbot() {
        if (windowDiv.classList.contains('d-none') || windowDiv.classList.contains('chatbot-closing')) return;
        windowDiv.classList.add('chatbot-closing');
        setTimeout(() => {
            windowDiv.classList.add('d-none');
            windowDiv.classList.remove('chatbot-closing');
            toggleBtn.style.transform = 'scale(1)';
        }, 280);
    }

    // Toggle Chatbot
    toggleBtn.addEventListener('click', () => {
        windowDiv.classList.remove('d-none');
        toggleBtn.style.transform = 'scale(0)';
    });

    closeBtn.addEventListener('click', closeChatbot);

    // Click outside to close
    document.addEventListener('mousedown', (event) => {
        if (!windowDiv.classList.contains('d-none')) {
            // Check if click is outside the window and toggle button
            if (!windowDiv.contains(event.target) && !toggleBtn.contains(event.target)) {
                closeChatbot();
            }
        }
    });

    // Prevent closing when clicking inside the chatbot
    windowDiv.addEventListener('mousedown', (event) => {
        event.stopPropagation();
    });

    // Send Message on Enter
    inputField.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });

    // Send Message on Click
    sendBtn.addEventListener('click', sendMessage);

    function addMessage(text, isUser, isHtml = false) {
        const msgDiv = document.createElement("div");
        msgDiv.className = "chat-msg " + (isUser ? "user-msg" : "ai-msg");
        
        const bubble = document.createElement("div");
        bubble.className = "msg-bubble shadow-sm";
        if(isHtml){
            bubble.innerHTML = text;
        }else{
            bubble.textContent = text;
        }

        msgDiv.appendChild(bubble);
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        return msgDiv; // Return reference to remove later (e.g. typing indicator)
    }

    async function sendMessage() {
        const userText = inputField.value.trim();
        if (!userText) return;

        // Display user message
        addMessage(userText, true);
        chatHistory.push({ text: userText, isUser: true });
        inputField.value = '';

        // Add typing indicator
        const typingHTML = `<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>`;
        const typingIndicator = addMessage(typingHTML, false, true);

        // Try to gather context from page if elements exist
        const cityInput = document.getElementById('city');
        const cropInput = document.getElementById('crop');
        const cityContext = cityInput ? cityInput.value : '';
        const cropContext = cropInput ? cropInput.value : '';

        try {
            const response = await fetch('/ask-ai', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ 
                    message: userText,
                    city: cityContext,
                    crop: cropContext,
                    history: chatHistory.slice(0, -1)
                })
            });

            const data = await response.json();
            
            // Remove typing indicator
            typingIndicator.remove();

            if (data.reply) {
                // Formatting newlines and markdown nicely using marked.js if available
                let formattedHtml = data.reply;
                if (typeof marked !== 'undefined') {
                    formattedHtml = marked.parse(data.reply);
                } else {
                    formattedHtml = data.reply.replace(/\n/g, '<br>');
                }
                
                addMessage(formattedHtml, false, true);
                chatHistory.push({ text: data.reply, isUser: false });
            } else if (data.error) {
                addMessage("Oops! " + data.error, false);
            }

        } catch (error) {
            typingIndicator.remove();
            addMessage("Could not connect to the server. Please check your internet connection.", false);
        }
    }
});
</script>
