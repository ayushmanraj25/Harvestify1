{% extends 'layout.html' %}

{% block body %}
<section class="tool-page">
	
	<!-- INTRO -->
	<div class="tool-intro text-center mb-5">
		<p class="eyebrow text-uppercase mb-2 text-success">Crop intelligence</p>
		<h2 class="mb-3">Find the best crop for your soil.</h2>
		<p class="text-muted">
			Enter soil values & get instant AI recommendation 🌱
		</p>
	</div>

	<!-- CARD -->
	<div class="tool-card shadow-lg p-4 rounded">

		<form method="POST" action="{{ url_for('crop_prediction') }}">
			
			<div class="input-grid">

				<!-- N -->
				<div class="form-group">
					<label>Nitrogen (N)</label>
					<input type="number" class="form-control"
						name="nitrogen" placeholder="e.g. 50"
						required>
					<small class="text-muted">Essential for leaf growth</small>
				</div>

				<!-- P -->
				<div class="form-group">
					<label>Phosphorous (P)</label>
					<input type="number" class="form-control"
						name="phosphorous" placeholder="e.g. 40"
						required>
					<small class="text-muted">Supports root development</small>
				</div>

				<!-- K -->
				<div class="form-group">
					<label>Potassium (K)</label>
					<input type="number" class="form-control"
						name="pottasium" placeholder="e.g. 40"
						required>
					<small class="text-muted">Improves crop quality</small>
				</div>

				<!-- pH -->
				<div class="form-group">
					<label>pH Level</label>
					<input type="number" step="0.01"
						class="form-control"
						name="ph" placeholder="e.g. 6.5"
						required>
					<small class="text-muted">Ideal: 5.5 - 7</small>
				</div>

				<!-- Rainfall -->
				<div class="form-group">
					<label>Rainfall (mm)</label>
					<input type="number" step="0.01"
						class="form-control"
						name="rainfall"
						placeholder="Enter rainfall"
						required>
				</div>

				<!-- State + City -->
				<div class="form-group form-group--full">
					<label>State</label>
					<select onchange="print_city('city', this.selectedIndex);"
						id="sts" name="stt"
						class="form-control" required>
					</select>

					<label class="mt-3">City</label>
					<select id="city" class="form-control"
						name="city" required>
					</select>
				</div>

			</div>

			<!-- BUTTON -->
			<div class="text-center mt-4">
				<button type="submit"
					class="btn btn-success btn-lg px-5 shadow-sm">
					🚀 Predict Best Crop
				</button>
			</div>

		</form>

	</div>
</section>
{% endblock %}

{% block scripts %}
<script>
	document.addEventListener('DOMContentLoaded', function () {
		if (typeof print_state === 'function') {
			print_state('sts');
		}
	});
</script>
{% endblock %}
