{% extends 'layout.html' %}

{% block body %}
<style>
    .mandi-header {
        background: linear-gradient(135deg, rgba(82, 183, 108, 0.1), rgba(45, 122, 66, 0.05));
        border-radius: 20px;
        padding: 40px 20px;
        margin-bottom: 30px;
        position: relative;
        overflow: hidden;
    }
    .live-indicator {
        display: inline-block;
        width: 10px;
        height: 10px;
        background-color: #28a745;
        border-radius: 50%;
        margin-right: 8px;
        box-shadow: 0 0 10px #28a745;
        animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7); }
        70% { box-shadow: 0 0 0 10px rgba(40, 167, 69, 0); }
        100% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); }
    }
    .filter-card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(0,0,0,0.05);
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        margin-top: -40px;
        position: relative;
        z-index: 10;
    }
    body.dark-theme .filter-card {
        background: rgba(30, 30, 30, 0.9);
        border-color: rgba(255,255,255,0.05);
    }
    
    .price-card {
        border-radius: 16px;
        border: none;
        box-shadow: 0 5px 20px rgba(0,0,0,0.04);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        height: 100%;
        overflow: hidden;
    }
    .price-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 30px rgba(0,0,0,0.1);
    }
    body.dark-theme .price-card {
        background: #1e1e1e;
        box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }
    .card-top {
        padding: 20px;
        border-bottom: 1px solid rgba(0,0,0,0.03);
    }
    body.dark-theme .card-top { border-bottom-color: rgba(255,255,255,0.03); }
    .card-bottom {
        padding: 15px 20px;
        background: rgba(82, 183, 108, 0.03);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    
    .trend-up { color: #28a745; font-weight: bold; }
    .trend-down { color: #dc3545; font-weight: bold; }
    
    .commodity-icon {
        width: 45px;
        height: 45px;
        background: rgba(82, 183, 108, 0.1);
        color: #52b76c;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
    }
</style>

<div class="container py-4">
    
    <!-- Header -->
    <div class="mandi-header text-center">
        <span class="badge badge-success mb-3 px-3 py-2 rounded-pill shadow-sm" style="font-size: 0.85rem;">
            <span class="live-indicator"></span> LIVE UPDATES
        </span>
        <h1 class="font-weight-bold">Live Mandi Prices 🌾</h1>
        <p class="text-muted">Get real-time market rates for crops across India to make profitable decisions.</p>
    </div>

    <!-- Filters -->
    <div class="row justify-content-center mb-5">
        <div class="col-md-11">
            <div class="filter-card">
                <div class="row align-items-end">
                    <div class="col-md-3 mb-3 mb-md-0">
                        <label class="font-weight-bold text-muted small">Select State</label>
                        <select onchange="print_city('city', this.selectedIndex);" id="stt" name="stt" class="form-control" style="border-radius: 10px;" required></select>
                    </div>
                    <div class="col-md-3 mb-3 mb-md-0">
                        <label class="font-weight-bold text-muted small">Select City</label>
                        <select id="city" class="form-control" style="border-radius: 10px;" required></select>
                    </div>
                    <div class="col-md-3 mb-3 mb-md-0">
                        <label class="font-weight-bold text-muted small">Crop / Commodity</label>
                        <input type="text" id="crop-filter" list="crop-list" class="form-control" placeholder="e.g. Wheat, Rice" style="border-radius: 10px;">
                        <datalist id="crop-list">
                            <option value="Wheat">
                            <option value="Rice">
                            <option value="Maize">
                            <option value="Onion">
                            <option value="Potato">
                            <option value="Tomato">
                            <option value="Cotton">
                            <option value="Sugarcane">
                        </datalist>
                    </div>
                    <div class="col-md-3">
                        <button id="search-btn" class="btn btn-success btn-block" style="border-radius: 10px; font-weight: 600;">
                            Search Prices
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div id="loader" class="text-center d-none my-5">
        <div class="spinner-border text-success" role="status" style="width: 3rem; height: 3rem;">
            <span class="sr-only">Loading...</span>
        </div>
        <p class="text-muted mt-3">Fetching latest market rates...</p>
    </div>

    <!-- Results Area -->
    <div id="results-area" class="row">
        <!-- JS will populate cards here -->
    </div>

</div>

<!-- JavaScript to fetch and render data -->
<script src="{{ url_for('static', filename='scripts/cities.js') }}"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    // Initialize state dropdown from cities.js
    print_state("stt");

    const searchBtn = document.getElementById('search-btn');
    const stateFilter = document.getElementById('stt');
    const cityFilter = document.getElementById('city');
    const cropFilter = document.getElementById('crop-filter');
    const resultsArea = document.getElementById('results-area');
    const loader = document.getElementById('loader');

    // Emoji mapping for aesthetics
    const getEmoji = (crop) => {
        const c = crop.toLowerCase();
        if(c.includes('wheat')) return '🌾';
        if(c.includes('rice')) return '🍚';
        if(c.includes('maize') || c.includes('corn')) return '🌽';
        if(c.includes('potato')) return '🥔';
        if(c.includes('onion')) return '🧅';
        if(c.includes('tomato')) return '🍅';
        if(c.includes('cotton')) return '☁️';
        return '🌱';
    };

    function fetchPrices() {
        // Show loader, hide results
        resultsArea.innerHTML = '';
        loader.classList.remove('d-none');
        
        const state = encodeURIComponent(stateFilter.value);
        const crop = encodeURIComponent(cropFilter.value);
        
        fetch(`/api/mandi-prices?state=${state}&crop=${crop}`)
            .then(response => response.json())
            .then(data => {
                loader.classList.add('d-none');
                
                if (data.status === 'success') {
                    if (data.data.length === 0) {
                        resultsArea.innerHTML = `<div class="col-12 text-center text-muted my-5"><h5>No prices found for the selected criteria.</h5><p>Try searching for a different crop or state.</p></div>`;
                        return;
                    }

                    data.data.forEach(item => {
                        // Determine trend HTML
                        let trendHtml = '';
                        if (item.trend === 'up') {
                            trendHtml = `<span class="trend-up"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="mr-1"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg> Price Up</span>`;
                        } else {
                            trendHtml = `<span class="trend-down"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="mr-1"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline><polyline points="17 18 23 18 23 12"></polyline></svg> Price Down</span>`;
                        }

                        // Create card
                        const cardHTML = `
                        <div class="col-md-6 col-lg-4 mb-4">
                            <div class="card price-card">
                                <div class="card-top">
                                    <div class="d-flex align-items-start justify-content-between mb-3">
                                        <div class="d-flex align-items-center">
                                            <div class="commodity-icon mr-3">${getEmoji(item.commodity)}</div>
                                            <div>
                                                <h5 class="font-weight-bold mb-0">${item.commodity}</h5>
                                                <small class="text-muted">${item.market}, ${item.state}</small>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="mt-3">
                                        <h2 class="font-weight-bold text-success mb-1">₹${item.modal_price} <span style="font-size: 1rem; color: #888;">/ Quintal</span></h2>
                                        <small class="text-muted">Min: ₹${item.min_price} | Max: ₹${item.max_price}</small>
                                    </div>
                                </div>
                                <div class="card-bottom">
                                    ${trendHtml}
                                    <span class="badge badge-light text-muted border">Updated: ${item.date}</span>
                                </div>
                            </div>
                        </div>`;
                        
                        resultsArea.innerHTML += cardHTML;
                    });
                } else {
                    resultsArea.innerHTML = `<div class="col-12 text-center text-danger my-5"><h5>Error loading data.</h5><p>${data.message}</p></div>`;
                }
            })
            .catch(error => {
                loader.classList.add('d-none');
                resultsArea.innerHTML = `<div class="col-12 text-center text-danger my-5"><h5>Connection Error.</h5><p>Could not connect to the market server.</p></div>`;
                console.error("Mandi API Error:", error);
            });
    }

    // Event listeners
    searchBtn.addEventListener('click', fetchPrices);
    cropFilter.addEventListener('keypress', (e) => { if (e.key === 'Enter') fetchPrices(); });

    // Initial fetch
    fetchPrices();
});
</script>

{% endblock %}
